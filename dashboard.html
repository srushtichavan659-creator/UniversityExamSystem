<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Welcome to University Exam System 🎉</h1>

    <p>Login Successful!</p>

    <button onclick="logout()">Logout</button>

    <script>
        function logout() {
            window.location.href = "login.html";
        }
    </script>
<style>
    .dashboard-view { font-family: 'Segoe UI', Arial, sans-serif; max-width: 800px; margin: 30px auto; padding: 20px; background: #ffffff; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-radius: 12px; text-align: left; }
    .profile-banner { background: #2c3e50; color: white; padding: 20px; border-radius: 8px; margin-bottom: 25px; }
    .profile-banner h3 { margin: 0 0 10px 0; font-size: 24px; }
    .profile-banner p { margin: 5px 0; opacity: 0.9; }
    .data-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
    .data-table th, .data-table td { border: 1px solid #e0e0e0; padding: 12px 15px; text-align: left; color: #333; }
    .data-table th { background-color: #34495e; color: white; font-weight: 600; }
    .data-table tr:nth-child(even) { background-color: #f8f9fa; }
    .status-badge { background: #2ecc71; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
</style>

<div class="dashboard-view">
    <div class="profile-banner">
        <h3>Welcome, <span id="db-user">Student</span>! 👋</h3>
        <p><b>Exam Seat No:</b> <span id="db-seat">N/A</span></p>
        <p><b>Status:</b> <span class="status-badge">MySQL Database Sync (Active)</span></p>
    </div>

    <h2 style="color: #2c3e50;">📊 Your Exam Performance</h2>
    <table class="data-table">
        <thead>
            <tr>
                <th>Student Name</th>
                <th>Subject</th>
                <th>Exam Name</th>
                <th>Marks Obtained</th>
                <th>Grade</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><span id="t-name">Student</span></td>
                <td>Database Management Systems</td>
                <td>DBMS Mid Sem</td>
                <td><b><span id="t-marks">0</span>/100</b></td>
                <td><mark style="background: #e8f8f5; color: #1e8449; padding: 4px 8px; border-radius: 4px; font-weight: bold;"><span id="t-grade">-</span></mark></td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    
    
    const savedUser = localStorage.getItem("username") || "Srushti Chavan";
    const savedSeat = localStorage.getItem("seatNo") || "EXAM9074";
    const savedMarks = localStorage.getItem("marks") || "85";
    const savedGrade = localStorage.getItem("grade") || "A";


    document.getElementById("db-user").innerText = savedUser;
    document.getElementById("db-seat").innerText = savedSeat;
    document.getElementById("t-name").innerText = savedUser;
    document.getElementById("t-marks").innerText = savedMarks;
    document.getElementById("t-grade").innerText = savedGrade;
</script>
</body>
</html>
